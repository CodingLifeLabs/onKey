<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A24"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Key icon -->
  <g transform="translate(64, 48)" fill="white">
    <!-- Key head (ring) -->
    <circle cx="0" cy="-12" r="18" fill="none" stroke="white" stroke-width="7"/>
    <!-- Key shaft -->
    <rect x="-3.5" y="2" width="7" height="38" rx="2"/>
    <!-- Key teeth -->
    <rect x="3.5" y="28" width="14" height="7" rx="2"/>
    <rect x="3.5" y="38" width="10" height="7" rx="2"/>
  </g>
</svg>
